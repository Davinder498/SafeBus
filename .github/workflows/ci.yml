name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify Milestone 1 workspace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm from packageManager
        run: corepack enable

      - name: Install dependencies
        # pnpm-lock.yaml is not committed yet, so CI cannot use --frozen-lockfile.
        # Once pnpm-lock.yaml is committed, switch this to: pnpm install --frozen-lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build
